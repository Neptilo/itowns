<html>
    <head>
        <title>Itowns - Globe + vector-tiles 3d</title>

        <script type="importmap">
        {
            "imports": {
                "itowns": "../dist/itowns.js",
                "debug": "../dist/debug.js",
                "dat": "https://unpkg.com/dat.gui@0.7.9/build/dat.gui.module.js",
                "GuiTools": "./jsm/GUI/GuiTools.js",
                "LoadingScreen": "./jsm/GUI/LoadingScreen.js",
                "itowns_widgets": "../dist/itowns_widgets.js",
                "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
            }
        }
        </script>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" type="text/css" href="css/example.css">
        <link rel="stylesheet" type="text/css" href="css/LoadingScreen.css">
        <link rel="stylesheet" type="text/css" href="css/widgets.css">

    </head>
    <body>
        <div id="viewerDiv"></div>

        <!-- Import iTowns source code -->
        <!-- Import iTowns LoadingScreen and GuiTools plugins -->

        <script type="module">

            import GuiTools from 'GuiTools';
            import setupLoadingScreen from 'LoadingScreen';
            import * as THREE from 'three';
            import * as itowns from 'itowns';
            import * as debug from 'debug';
            import * as itowns_widgets from 'itowns_widgets';

            // ---------- CREATE A GlobeView FOR SUPPORTING DATA VISUALIZATION : ----------

            // Define camera initial position
            const placement = {
                coord: new itowns.Coordinates('EPSG:4326', 2.351323, 48.856712),
                range: 5000,
                tilt: 45,
            };

            // `viewerDiv` will contain iTowns' rendering area (`<canvas>`)
            const viewerDiv = document.getElementById('viewerDiv');

            // Create a GlobeView
            const view = new itowns.GlobeView(viewerDiv, placement);

            // Define poles texture
            view.tileLayer.noTextureColor = new THREE.Color(0x95c1e1);

            // Setup loading screen and debug menu
            setupLoadingScreen(viewerDiv, view);
            const debugMenu = new GuiTools('menuDiv', view, 300);

            function colorBuildings(properties) {
                if (properties.usage_1 === 'Résidentiel') {
                    return '#FDFDFF';
                } else if (properties.usage_1 === 'Annexe') {
                    return '#C6C5B9';
                } else if (properties.usage_1 === 'Commercial et services') {
                    return '#62929E';
                } else if (properties.usage_1 === 'Religieux') {
                    return '#393D3F';
                } else if (properties.usage_1 === 'Sportif') {
                    return '#546A7B';
                }

                return '#555555';
            }

            function extrudeBuildings(properties) {
                return properties.hauteur || 0;
            }

            let useFixedHeight = true;
            let useFixedColor = true;



            // ---------- DISPLAY CONTEXTUAL DATA : ----------

            // Add two elevation layers, each with a different level of detail. Each layer's properties are defined in
            // a json file.
            function addElevationLayerFromConfig(config) {
                config.source = new itowns.WMTSSource(config.source);
                view.addLayer(new itowns.ElevationLayer(config.id, config))
                    .then(debugMenu.addLayerGUI.bind(debugMenu));
            }
            itowns.Fetcher.json('./layers/JSONLayers/IGN_MNT_HIGHRES.json').then(addElevationLayerFromConfig);
            itowns.Fetcher.json('./layers/JSONLayers/WORLD_DTM.json').then(addElevationLayerFromConfig);

            // ---------- DISPLAY ORTHO-IMAGES : ----------

            const ortho = itowns.Fetcher.json('./layers/JSONLayers/Ortho.json').then(function _(config) {
                config.source = new itowns.WMTSSource(config.source);
                var layer = new itowns.ColorLayer('Ortho', config);
                return view.addLayer(layer);
            });

            // ---------- DISPLAY VECTOR TILED BUILDING DATA AS 3D MESHES : ----------

            // Define the source of the building data : those are vector tiled data from the geoportail.
            const buildingsSource = new itowns.VectorTilesSource({
                style: "https://data.geopf.fr/annexes/ressources/vectorTiles/styles/PLAN.IGN/standard.json",
                // We only want to display buildings related data.
                filter: (layer) => {
                    return layer['source-layer'].includes('bati_surf')
                        && layer.paint["fill-color"];
                },
            });

            // Create a FeatureGeometryLayer to support building data.
            var buildingsLayer = new itowns.FeatureGeometryLayer('VTBuilding',{
                source: buildingsSource,
                zoom: { min: 15 },
                accurate: false,
                style: {
                    fill: {
                        base_altitude: (p) => p.alti_sol || 0,
                        extrusion_height: extrudeBuildings,
                    }
                },
            });

            // Buttons to toggle extrusion height and color
            const extrusionToggle = {
                toggleHeight: function () {
                    useFixedHeight = !useFixedHeight;
                    buildingsLayer.style.fill.extrusion_height = useFixedHeight ? 8 : extrudeBuildings;
                    // buildingsLayer.needsUpdate = true;
                    view.notifyChange(buildingsLayer);
                },
                toggleColor: function () {
                    useFixedColor = !useFixedColor;
                    buildingsLayer.style.fill.color = useFixedColor ? '#00cc00' : colorBuildings;
                    // buildingsLayer.needsUpdate = true;
                    view.notifyChange(buildingsLayer);
                }
            };

            // Add the FeatureGeometryLayer to the scene and to the debug menu.
            view.addLayer(buildingsLayer)
                .then((layer) => {
                    const gui = debug.GeometryDebug.createGeometryDebugUI(debugMenu.gui, view, layer);
                    debug.GeometryDebug.addWireFrameCheckbox(gui, view, layer);
                    gui.add(extrusionToggle, 'toggleHeight').name('Toggle Extrusion (Property/8)');
                    gui.add(extrusionToggle, 'toggleColor').name('Toggle Color');
                    extrusionToggle.toggleHeight();
                    extrusionToggle.toggleColor();
                })



            // ---------- DEBUG TOOLS : ----------

            debug.createTileDebugUI(debugMenu.gui, view);

            view.addEventListener(itowns.GLOBE_VIEW_EVENTS.GLOBE_INITIALIZED, function () {
                ortho.then(function () {
                    itowns.ColorLayersOrdering.moveLayerToIndex(view, 'Ortho', 0);
                }).catch(console.error);
            });

            window.view = view;
            window.itowns = itowns;
            window.THREE = THREE;

        </script>
    </body>
</html>
